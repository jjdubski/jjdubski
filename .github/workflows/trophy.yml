name: Update README trophy

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    paths:
      - ".github/workflows/trophy.yml" # Run any time this file is modified
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate trophy card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: "username=${{ github.repository_owner }}&title=-Followers,-Organizations&theme=darkhub&column=4&margin-w=8&margin-h=8"
          path: profile/trophy.svg
          token: ${{ secrets.GH_PAT }}

      - name: Commit trophy card
        run: |
          git config user.name "jjdubski"
          git config user.email "101855602+jjdubski@users.noreply.github.com"
          git add profile/trophy.svg
          git commit -m "Update trophy card" || exit 0
          git push
