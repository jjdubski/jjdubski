name: Update README cards

on:
  push:
    paths:
      - ".github/workflows/grs.yml" # Run any time this file is modified
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dark&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=dark&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GH_PAT }}

      - name: Commit cards
        run: |
          git config user.name "jjdubski"
          git config user.email "101855602+jjdubski@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git pull --rebase origin main
          git push
